name = "investment-alpha-bot"
main = "index.js"
compatibility_date = "2026-01-01"

# ── KV namespace binding ───────────────────────────────────────────────────
# Create this namespace first:
#   npx wrangler kv:namespace create "investment-alpha-kv"
# Then paste the returned id below.
[[kv_namespaces]]
binding = "KV"
id = "3e0d7e6bb3e94d4a93670ba6a5da1ecf"

# ── Scheduled triggers ─────────────────────────────────────────────────────
# Runs every 2 minutes — price monitor checks TP targets, fires Discord alerts,
# auto-executes sells after a 2-min window (regular hours only, 9:30am–4pm ET).
[triggers]
crons = ["*/2 * * * *", "25 13 * * 1-5"]

# ── Worker secrets (never stored here — set via CLI) ───────────────────────
# After `npx wrangler login`, run these commands once:
#
#   npx wrangler secret put DISCORD_PUBLIC_KEY
#   npx wrangler secret put OWNER_ID
#   npx wrangler secret put GH_TOKEN
#   npx wrangler secret put GH_REPO           # e.g. srijanbansal/investment-alpha
#   npx wrangler secret put DISCORD_WEBHOOK_URL
#   npx wrangler secret put TV_SECRET         # any strong random string, e.g. openssl rand -hex 32
#   npx wrangler secret put ALPACA_KEY
#   npx wrangler secret put ALPACA_SECRET
#   npx wrangler secret put ALPACA_BASE_URL   # https://paper-api.alpaca.markets
#
# Deploy:
#   npx wrangler deploy
#
# Your webhook URL (put in TradingView alerts):
#   https://investment-alpha-bot.<your-subdomain>.workers.dev/webhook
