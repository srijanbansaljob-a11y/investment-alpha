name: Weekly Learning Update

# Saturdays 12:00 UTC, when markets are closed:
#   1. Evaluate matured shadow-portfolio snapshots (top-30 per run)
#   2. Update per-regime factor weights via EWMA information coefficient
#      and export the active regime's weights for scoring.py
#   3. Stop-loss post-mortem: were the stops too tight? (suggestions only)
#   4. Decision review: score your ✅/❌ calls vs what happened next
#   5. Commit all learning state back to the repo

on:
  schedule:
    - cron: "0 12 * * 6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  learn:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Learning update (shadow + per-regime weights)
        env:
          ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN:   ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID:  ${{ secrets.DISCORD_CHANNEL_ID }}
          FINNHUB_API_KEY:     ${{ secrets.FINNHUB_API_KEY }}
        run: python pipeline/learning.py

      - name: Post-mortem + decision review
        env:
          ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN:   ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID:  ${{ secrets.DISCORD_CHANNEL_ID }}
          FINNHUB_API_KEY:     ${{ secrets.FINNHUB_API_KEY }}
        run: python pipeline/postmortem.py

      - name: Commit learning state back
        run: |
          git config user.name "investment-alpha-bot"
          git config user.email "actions@github.com"
          git add data/*.json outputs/stop_loss_log.json || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: weekly learning update [skip ci]"
            git pull --rebase origin main || true
            git push
          else
            echo "No learning state changes"
          fi
