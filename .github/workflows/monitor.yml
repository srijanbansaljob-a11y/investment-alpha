name: Intraday Portfolio Monitor

# Runs every 15 minutes on weekdays during US market hours.
#
# Each run calls: python broker/monitor.py --once
#   → checks all Alpaca positions against stop-loss / profit target / sharp-move triggers
#   → posts Discord alerts with ✅ Approve / ❌ Reject buttons for any breach
#   → ALERT-ONLY: nothing is ever sold without your explicit button press
#   → exits cleanly
#
# Required GitHub Secrets (Settings → Secrets → Actions → New repository secret):
#   ALPACA_API_KEY       — your Alpaca paper trading API key
#   ALPACA_SECRET_KEY    — your Alpaca paper trading secret key
#   ALPACA_BASE_URL      — https://paper-api.alpaca.markets
#   DISCORD_WEBHOOK_URL  — your Discord webhook URL (fallback alerts)
#   DISCORD_BOT_TOKEN    — bot token (needed for approval buttons)
#   DISCORD_CHANNEL_ID   — alerts channel ID
#   FINNHUB_API_KEY      — your Finnhub API key (if SENTIMENT_ENABLED=True)

on:
  schedule:
    # Every 15 minutes, Mon–Fri, 13:00–21:45 UTC.
    # Covers US market hours in BOTH summer (EDT = UTC-4) and winter
    # (EST = UTC-5) — fixes the old DST gap that missed the first trading
    # hour Nov–Mar. monitor.py --once checks is_market_open() and exits
    # immediately when closed, so off-hours runs cost ~seconds.
    - cron: "*/15 13-21 * * 1-5"

  # Allow manual trigger from GitHub Actions UI (useful for testing)
  workflow_dispatch:

jobs:
  monitor:
    name: Monitor Portfolio
    runs-on: ubuntu-latest
    timeout-minutes: 10   # kill if it hangs (shouldn't take >3 min normally)

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"            # cache pip packages between runs (speeds up install)

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor (single check)
        env:
          ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:     ${{ secrets.ALPACA_BASE_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN:   ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID:  ${{ secrets.DISCORD_CHANNEL_ID }}
          FINNHUB_API_KEY:     ${{ secrets.FINNHUB_API_KEY }}
        run: |
          python broker/monitor.py --once
