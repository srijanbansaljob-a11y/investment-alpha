name: Intraday Portfolio Monitor

# Runs every 15 minutes on weekdays during US market hours (9:15 AM – 4:15 PM ET).
# ET = UTC-4 (summer/EDT) → 13:15–20:15 UTC
# Starts 15 min before open to catch pre-market moves; ends 15 min after close.
#
# Each run calls: python broker/monitor.py --once
#   → checks all Alpaca positions against stop-loss / profit target / sharp-move triggers
#   → sends Discord alerts if any levels are breached
#   → auto-executes queued sells past their 5-min delay (via Alpaca paper trading API)
#   → exits cleanly
#
# Required GitHub Secrets (Settings → Secrets → Actions → New repository secret):
#   ALPACA_API_KEY       — your Alpaca paper trading API key
#   ALPACA_SECRET_KEY    — your Alpaca paper trading secret key
#   ALPACA_BASE_URL      — https://paper-api.alpaca.markets
#   DISCORD_WEBHOOK_URL  — your Discord webhook URL
#   FINNHUB_API_KEY      — your Finnhub API key (if SENTIMENT_ENABLED=True)

on:
  schedule:
    # Every 15 minutes, Mon–Fri, 13:15–20:15 UTC (= 9:15 AM–4:15 PM EDT)
    - cron: "15 13 * * 1-5"
    - cron: "30 13 * * 1-5"
    - cron: "45 13 * * 1-5"
    - cron: "0  14 * * 1-5"
    - cron: "15 14 * * 1-5"
    - cron: "30 14 * * 1-5"
    - cron: "45 14 * * 1-5"
    - cron: "0  15 * * 1-5"
    - cron: "15 15 * * 1-5"
    - cron: "30 15 * * 1-5"
    - cron: "45 15 * * 1-5"
    - cron: "0  16 * * 1-5"
    - cron: "15 16 * * 1-5"
    - cron: "30 16 * * 1-5"
    - cron: "45 16 * * 1-5"
    - cron: "0  17 * * 1-5"
    - cron: "15 17 * * 1-5"
    - cron: "30 17 * * 1-5"
    - cron: "45 17 * * 1-5"
    - cron: "0  18 * * 1-5"
    - cron: "15 18 * * 1-5"
    - cron: "30 18 * * 1-5"
    - cron: "45 18 * * 1-5"
    - cron: "0  19 * * 1-5"
    - cron: "15 19 * * 1-5"
    - cron: "30 19 * * 1-5"
    - cron: "45 19 * * 1-5"
    - cron: "0  20 * * 1-5"
    - cron: "15 20 * * 1-5"

  # Allow manual trigger from GitHub Actions UI (useful for testing)
  workflow_dispatch:

jobs:
  monitor:
    name: Monitor Portfolio
    runs-on: ubuntu-latest
    timeout-minutes: 10   # kill if it hangs (shouldn't take >3 min normally)

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"            # cache pip packages between runs (speeds up install)

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor (single check)
        env:
          ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:     ${{ secrets.ALPACA_BASE_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FINNHUB_API_KEY:     ${{ secrets.FINNHUB_API_KEY }}
        run: |
          python broker/monitor.py --once
