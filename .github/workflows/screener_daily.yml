name: Daily Screener

# Runs 3x per weekday at ET:
#   08:00 — pre-market setup (Fear & Greed just refreshed)
#   11:00 — mid-morning (ADX + breadth reflect real intraday trend, past opening noise)
#   15:30 — pre-close (sets overnight regime signal)
# Each run: scores stocks, computes 6-component regime, pushes to Cloudflare KV.

on:
  schedule:
    # 8:00 AM ET
    - cron: "0 12 * * 1-5"    # EDT (summer)
    - cron: "0 13 * * 1-5"    # EST (winter)
    # 11:00 AM ET
    - cron: "0 15 * * 1-5"    # EDT (summer)
    - cron: "0 16 * * 1-5"    # EST (winter)
    # 3:30 PM ET
    - cron: "30 19 * * 1-5"   # EDT (summer)
    - cron: "30 20 * * 1-5"   # EST (winter)
  workflow_dispatch:

jobs:
  screener:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Guard — only run at 08, 11, or 15 New York
        id: tz
        run: |
          HOUR=$(TZ=America/New_York date +%H)
          MIN=$(TZ=America/New_York date +%M)
          echo "NY time: $HOUR:$MIN"
          if [ "$HOUR" = "08" ] || [ "$HOUR" = "11" ] || [ "$HOUR" = "15" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "go=true" >> $GITHUB_OUTPUT
          else
            echo "go=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.tz.outputs.go == 'true'
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        if: steps.tz.outputs.go == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.tz.outputs.go == 'true'
        run: |
          pip install requests pandas python-dotenv

      - name: Run daily screener
        if: steps.tz.outputs.go == 'true'
        env:
          ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY_SCREENER }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY_SCREENER }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN:   ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID:  ${{ secrets.DISCORD_CHANNEL_ID }}
          FINNHUB_API_KEY:     ${{ secrets.FINNHUB_API_KEY }}
        run: |
          set -o pipefail
          python screener/daily_sentiment_runner.py 2>&1
          echo "Exit code: $?"

      - name: Push regime to Cloudflare KV
        if: steps.tz.outputs.go == 'true'
        env:
          CF_ACCOUNT_ID:   ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE: ${{ secrets.CF_KV_NAMESPACE }}
          CF_API_TOKEN:    ${{ secrets.CF_API_TOKEN }}
        run: |
          python screener/regime_to_kv.py \
            --regime-file screener/daily_sentiment_data.json

      - name: Commit screener outputs (8AM only)
        if: steps.tz.outputs.go == 'true'
        run: |
          HOUR=$(TZ=America/New_York date +%H)
          if [ "$HOUR" != "08" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Skipping commit — not the 8AM run (hour=$HOUR)"
            exit 0
          fi
          git config user.name "investment-alpha-bot"
          git config user.email "actions@github.com"
          git add screener/daily_sentiment_data.json screener/sentiment_history.csv screener/trade_log.csv || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily screener output $(date -u +%Y-%m-%d) [skip ci]"
            git pull --rebase origin main || true
            git push
          else
            echo "No screener output changes to commit"
          fi

      - name: Alert Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          HOUR=$(TZ=America/New_York date +%H:%M)
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"❌ Daily Screener Failed\",\"description\":\"The $HOUR ET screener run failed — KV was not updated.\\n[View run]($RUN_URL)\",\"color\":15158332}]}"
