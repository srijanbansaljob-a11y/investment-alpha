name: Weekly Analysis

on:
  schedule:
    # Sunday 6PM ET (EDT: 22:00 UTC, EST: 23:00 UTC)
    - cron: "0 22 * * 0"
    - cron: "0 23 * * 0"
  workflow_dispatch:

jobs:
  weekly-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Check Sunday
        id: check
        run: |
          DAY=$(TZ="America/New_York" date +%u)
          echo "day=$DAY" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        if: steps.check.outputs.day == '7'

      - name: Set up Python
        if: steps.check.outputs.day == '7'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.check.outputs.day == '7'
        run: pip install requests

      - name: Run weekly analysis
        if: steps.check.outputs.day == '7'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          cd screener
          python weekly_analysis.py

      - name: Commit analysis output
        if: steps.check.outputs.day == '7'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screener/outputs/ || true
          git diff --cached --quiet || git commit -m "chore: weekly analysis $(date -u +%Y-%m-%d)"
          git push
