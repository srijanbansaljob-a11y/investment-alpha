name: Nightly Updater

# Runs at 4:30 PM ET (after market close) every weekday.
# Fills forward prices (1d / 3d / 5d) in the trade_log.csv,
# classifies outcomes (WIN / LOSS / FLAT), and prints a running win rate.
# This data feeds the weekly_analysis.py learning loop.

on:
  schedule:
    - cron: "30 20 * * 1-5"   # 4:30 PM EDT (summer, UTC-4)
    - cron: "30 21 * * 1-5"   # 4:30 PM EST (winter, UTC-5)
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Guard — only run at 4:30 PM New York
        id: tz
        run: |
          HOUR=$(TZ=America/New_York date +%H)
          MIN=$(TZ=America/New_York date +%M)
          echo "NY time: $HOUR:$MIN"
          # Allow 16:xx window
          if [ "$HOUR" = "16" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "go=true" >> $GITHUB_OUTPUT
          else
            echo "go=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.tz.outputs.go == 'true'
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        if: steps.tz.outputs.go == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.tz.outputs.go == 'true'
        run: pip install requests

      - name: Run nightly updater
        if: steps.tz.outputs.go == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python screener/nightly_updater.py

      - name: Commit updated trade log
        if: steps.tz.outputs.go == 'true'
        run: |
          git config user.name "investment-alpha-bot"
          git config user.email "actions@github.com"
          git add screener/trade_log.csv || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: nightly price update $(date -u +%Y-%m-%d) [skip ci]"
            git pull --rebase origin main || true
            git push
          else
            echo "No trade log changes to commit"
          fi

      - name: Alert Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"❌ Nightly Updater Failed\",\"description\":\"Trade log was not updated — forward prices missing.\\n[View run]($RUN_URL)\",\"color\":15158332}]}"
